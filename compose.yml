services:
  tapestry:
    build: .
    volumes:
      - tapestry-data:/data
    environment:
      # Optional: point at your Lyrion / LMS server
      #LYRION_URL: http://0.0.0.0:9000/jsonrpc.js
      TAPESTRY_DATA_DIR: /data
    restart: unless-stopped
    # Needed for mDNS/Zeroconf LMS discovery across the LAN.
    # The app listens on port 8080 directly on the host.
    # If you don't need auto-discovery, remove `network_mode: host`
    # and add `ports: ["8080:8080"]` instead.
    network_mode: host

volumes:
  tapestry-data:
